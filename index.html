<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Yatzy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            background: #f2f2f2;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,.25);
            width: 95vw;
            max-width: 1100px;
            touch-action: none;
        }
    </style>
</head>
<body>

<canvas id="game" width="1100" height="540"></canvas>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const MENU = 0, PLAYER_SELECT = 1, PLAYING = 2, GAMEOVER = 3;
    let state = MENU;

    let username = "";
    let numPlayers = 1;
    let pIdx = 0;
    let dice = [1, 1, 1, 1, 1];
    let kept = [false, false, false, false, false];
    let rollsLeft = 2;
    let rolling = false;
    let rollFrames = 0;
    let showLeaderboard = false;

    const colors = ["#3498db", "#e74c3c", "#2ecc71", "#9b59b6"];
    const cats = ["1s", "2s", "3s", "4s", "5s", "6s", "3k", "4k", "FH", "SS", "LS", "YZ", "CH"];

    let scores = [];
    let leaderboard = JSON.parse(localStorage.getItem("yatzy_leaderboard")) || [];

    function rollDie() { return Math.floor(Math.random() * 6) + 1; }

    function startTurn() {
        for (let i = 0; i < 5; i++) {
            if (!kept[i]) dice[i] = rollDie();
        }
        kept = [false, false, false, false, false];
        rollsLeft = 2;
    }

    function getVal(c, d) {
        let counts = {};
        d.forEach(v => counts[v] = (counts[v] || 0) + 1);
        let sum = d.reduce((a, b) => a + b, 0);
        
        if (c.endsWith("s")) {
            let n = parseInt(c);
            return d.filter(x => x == n).length * n;
        }
        if (c == "3k") return Object.values(counts).some(v => v >= 3) ? sum : 0;
        if (c == "4k") return Object.values(counts).some(v => v >= 4) ? sum : 0;
        if (c == "FH") {
            let v = Object.values(counts).sort();
            return (v.toString() == "2,3" || v.includes(5)) ? 25 : 0;
        }
        if (c == "SS") {
            let s = [[1, 2, 3, 4], [2, 3, 4, 5], [3, 4, 5, 6]];
            return s.some(a => a.every(x => d.includes(x))) ? 30 : 0;
        }
        if (c == "LS") {
            let s = [...new Set(d)].sort((a,b)=>a-b);
            if(s.length < 5) return 0;
            return (s[4] - s[0] === 4) ? 40 : 0;
        }
        if (c == "YZ") return new Set(d).size == 1 ? 50 : 0;
        return sum;
    }

    function gameFinished() {
        if (scores.length === 0) return false;
        for (let p = 0; p < numPlayers; p++) {
            for (let c of cats) if (scores[p][c] == null) return false;
        }
        return true;
    }

    function getTotal(player) {
        let t = 0;
        for (let c of cats) t += scores[player][c] || 0;
        return t;
    }

    function roundRect(x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
    }

    canvas.onclick = e => {
        let rect = canvas.getBoundingClientRect();
        let mx = (e.clientX - rect.left) * (canvas.width / rect.width);
        let my = (e.clientY - rect.top) * (canvas.height / rect.height);

        // Leaderboard Toggle
        if (mx > 960 && mx < 1080 && my > 10 && my < 40) {
            showLeaderboard = !showLeaderboard;
            return;
        }

        if (state == MENU) {
            username = localStorage.getItem("yatzyUser") || prompt("Enter username:") || "Player";
            localStorage.setItem("yatzyUser", username);
            state = PLAYER_SELECT;
        } 
        else if (state == PLAYER_SELECT) {
            for (let i = 1; i <= 4; i++) {
                let y = 140 + i * 60;
                if (mx > 460 && mx < 590 && my > y && my < y + 40) {
                    numPlayers = i;
                    scores = [];
                    for (let p = 0; p < numPlayers; p++) {
                        let obj = {};
                        cats.forEach(c => obj[c] = null);
                        scores.push(obj);
                    }
                    pIdx = 0;
                    startTurn();
                    state = PLAYING;
                }
            }
        } 
        else if (state == PLAYING) {
            // Dice clicking
            for (let i = 0; i < 5; i++) {
                let x = 40 + i * 70;
                if (mx > x && mx < x + 55 && my > 70 && my < 125) kept[i] = !kept[i];
            }
            // Roll button
            if (mx > 400 && mx < 480 && my > 70 && my < 125 && rollsLeft > 0 && !rolling) {
                rolling = true;
                rollFrames = 15;
                rollsLeft--;
            }
            // Restart
            if (mx > 900 && mx < 1040 && my > 70 && my < 120) state = MENU;

            // Scoring
            for (let i = 0; i < cats.length; i++) {
                let x = 10 + i * 80;
                let y = 220 + pIdx * 30;
                if (mx > x && mx < x + 70 && my > y && my < y + 26) {
                    let c = cats[i];
                    if (scores[pIdx][c] == null) {
                        scores[pIdx][c] = getVal(c, dice);
                        if (gameFinished()) {
                            let best = 0;
                            for (let p = 0; p < numPlayers; p++) best = Math.max(best, getTotal(p));
                            leaderboard.push({ name: username, score: best });
                            leaderboard.sort((a, b) => b.score - a.score);
                            leaderboard = leaderboard.slice(0, 10);
                            localStorage.setItem("yatzy_leaderboard", JSON.stringify(leaderboard));
                            state = GAMEOVER;
                        } else {
                            pIdx = (pIdx + 1) % numPlayers;
                            startTurn();
                        }
                    }
                }
            }
        } 
        else if (state == GAMEOVER) {
            state = MENU;
        }
    };

    function update() {
        if (rolling) {
            rollFrames--;
            for (let i = 0; i < 5; i++) if (!kept[i]) dice[i] = rollDie();
            if (rollFrames <= 0) rolling = false;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, 1100, 540);
        ctx.strokeStyle = "black";
        ctx.lineWidth = 1;

        if (state == MENU) {
            ctx.fillStyle = "black";
            ctx.font = "44px Arial";
            ctx.fillText("Yatzy", 485, 120);
            ctx.fillStyle = "#ddd";
            roundRect(480, 220, 140, 40, 10);
            ctx.fillStyle = "black";
            ctx.font = "18px Arial";
            ctx.fillText("PLAY", 525, 245);
        } 
        else if (state == PLAYER_SELECT) {
            ctx.fillStyle = "black";
            ctx.font = "28px Arial";
            ctx.fillText("Select Players", 430, 80);
            for (let i = 1; i <= 4; i++) {
                let y = 140 + i * 60;
                ctx.fillStyle = "#ddd";
                roundRect(460, y, 130, 40, 10);
                ctx.fillStyle = "black";
                ctx.font = "16px Arial";
                ctx.fillText(i + " Player" + (i > 1 ? "s" : ""), 485, y + 25);
            }
        } 
        else if (state == PLAYING) {
            ctx.fillStyle = colors[pIdx];
            ctx.font = "18px Arial";
            ctx.fillText("Player: " + username, 40, 30);
            ctx.fillText("Rolls Left: " + rollsLeft, 40, 50);
            
            ctx.fillStyle = "#ddd";
            roundRect(900, 70, 140, 40, 10);
            ctx.fillStyle = "black";
            ctx.fillText("Restart", 940, 95);

            for (let i = 0; i < 5; i++) {
                let x = 40 + i * 70;
                ctx.fillStyle = kept[i] ? "#c8f7c5" : "#fff";
                roundRect(x, 70, 55, 55, 10);
                ctx.fillStyle = "black";
                ctx.font = "20px Arial";
                ctx.fillText(dice[i], x + 22, 105);
            }

            ctx.fillStyle = "#ddd";
            roundRect(400, 70, 80, 55, 10);
            ctx.fillStyle = "black";
            ctx.fillText("ROLL", 415, 105);

            for (let i = 0; i < cats.length; i++) {
                let x = 10 + i * 80;
                ctx.fillStyle = "black";
                ctx.font = "14px Arial";
                ctx.fillText(cats[i], x + 20, 210);
                for (let p = 0; p < numPlayers; p++) {
                    let val = scores[p] ? scores[p][cats[i]] : null;
                    let y = 220 + p * 30;
                    ctx.fillStyle = val != null ? colors[p] : "#e5e5e5";
                    ctx.fillRect(x, y, 70, 26);
                    ctx.strokeRect(x, y, 70, 26);
                    ctx.fillStyle = "black";
                    let disp = val != null ? val : (p == pIdx ? getVal(cats[i], dice) : "-");
                    ctx.fillText(disp, x + 28, y + 18);
                }
            }
        }

        if (state == GAMEOVER) {
            ctx.fillStyle = "rgba(255,255,255,0.9)";
            roundRect(350, 150, 400, 240, 12);
            ctx.fillStyle = "black";
            ctx.font = "28px Arial";
            ctx.fillText("Game Over", 470, 200);
            ctx.font = "18px Arial";
            ctx.fillText("Tap to return to menu", 440, 240);
        }

        // Leaderboard Button
        ctx.fillStyle = "#ddd";
        roundRect(960, 10, 120, 30, 8);
        ctx.fillStyle = "black";
        ctx.font = "14px Arial";
        ctx.fillText("Leaderboard", 975, 30);

        if (showLeaderboard) {
            ctx.fillStyle = "white";
            roundRect(750, 60, 320, 380, 12);
            ctx.fillStyle = "black";
            ctx.font = "20px Arial";
            ctx.fillText("Local High Scores", 810, 95);
            ctx.font = "16px Arial";
            leaderboard.forEach((e, i) => {
                ctx.fillText((i + 1) + ". " + e.name + " - " + e.score, 780, 135 + i * 26);
            });
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }
    loop();
</script>

</body>
</html>
