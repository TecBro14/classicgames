```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Yatzy</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

canvas{
background:rgba(255,255,255,.18);
backdrop-filter:blur(20px);
border-radius:18px;
box-shadow:0 25px 60px rgba(0,0,0,.7);
border:1px solid rgba(255,255,255,.25);
}

</style>
</head>

<body>

<canvas id="game" width="1000" height="520"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const MENU=0
const PLAYER_SELECT=1
const PLAYING=2
const GAME_OVER=3

let state=MENU

let numPlayers=4
let pIdx=0

let dice=[1,2,3,4,5]
let kept=[false,false,false,false,false]

let rollsLeft=2
let rolling=false
let rollTimer=0

const colors=["#3a7bff","#ff3a3a","#2ecc71","#b43aff"]

const cats=["1s","2s","3s","4s","5s","6s","3k","4k","FH","SS","LS","YZ","CH"]

let scores=[]

function rollDie(){
return Math.floor(Math.random()*6)+1
}

function startTurn(){

for(let i=0;i<5;i++) dice[i]=rollDie()

while(new Set(dice).size==1){
for(let i=0;i<5;i++) dice[i]=rollDie()
}

kept=[false,false,false,false,false]
rollsLeft=2

}

function getVal(c,d){

let counts={}
d.forEach(v=>counts[v]=(counts[v]||0)+1)

let sum=d.reduce((a,b)=>a+b)

if(c.endsWith("s")){
let n=parseInt(c)
return d.filter(x=>x==n).length*n
}

if(c=="3k") return Object.values(counts).some(v=>v>=3)?sum:0
if(c=="4k") return Object.values(counts).some(v=>v>=4)?sum:0

if(c=="FH"){
let v=Object.values(counts).sort()
if(v.toString()=="2,3"||v.includes(5)) return 25
return 0
}

if(c=="SS"){
let s=[[1,2,3,4],[2,3,4,5],[3,4,5,6]]
return s.some(a=>a.every(x=>d.includes(x)))?30:0
}

if(c=="LS"){
let s=[...new Set(d)]
return s.length==5 && Math.max(...d)-Math.min(...d)==4?40:0
}

if(c=="YZ") return new Set(d).size==1?50:0

return sum

}

function drawButton(x,y,w,h,text){

ctx.fillStyle="rgba(255,255,255,.25)"
ctx.fillRect(x,y,w,h)

ctx.strokeStyle="white"
ctx.strokeRect(x,y,w,h)

ctx.fillStyle="white"
ctx.font="18px Arial"
ctx.fillText(text,x+w/2-ctx.measureText(text).width/2,y+28)

}

function drawDie(x,y,val,keep){

ctx.save()

if(keep){
ctx.shadowColor="#00ff88"
ctx.shadowBlur=20
}

ctx.fillStyle="white"
ctx.fillRect(x,y,45,45)

ctx.strokeStyle="black"
ctx.strokeRect(x,y,45,45)

ctx.fillStyle="black"
ctx.font="20px Arial"
ctx.fillText(val,x+16,y+28)

ctx.restore()

}

canvas.onclick=e=>{

let rect=canvas.getBoundingClientRect()
let mx=e.clientX-rect.left
let my=e.clientY-rect.top

if(state==MENU){

if(mx>450&&mx<550&&my>240&&my<280){
state=PLAYER_SELECT
}

}

else if(state==PLAYER_SELECT){

for(let i=1;i<=4;i++){

let y=120+i*60

if(mx>440&&mx<560&&my>y&&my<y+40){

numPlayers=i

scores=[]
for(let p=0;p<numPlayers;p++){
let obj={}
cats.forEach(c=>obj[c]=null)
scores.push(obj)
}

startTurn()
state=PLAYING

}

}

}

else if(state==PLAYING){

for(let i=0;i<5;i++){

let x=40+i*60

if(mx>x&&mx<x+45&&my>60&&my<105){
kept[i]=!kept[i]
}

}

if(mx>350&&mx<430&&my>60&&my<105 && rollsLeft>0 && !rolling){

rolling=true
rollTimer=20
rollsLeft--

}

for(let i=0;i<cats.length;i++){

let x=10+i*60
let y=280

if(mx>x&&mx<x+55&&my>y&&my<420){

let c=cats[i]

if(scores[pIdx][c]==null){

scores[pIdx][c]=getVal(c,dice)

pIdx=(pIdx+1)%numPlayers
startTurn()

}

}

}

}

}

function update(){

if(rolling){

rollTimer--

for(let i=0;i<5;i++){
if(!kept[i]) dice[i]=rollDie()
}

if(rollTimer<=0) rolling=false

}

}

function drawScoreChart(){

for(let i=0;i<cats.length;i++){

let x=10+i*60
let y=280

ctx.fillStyle=i%2?"rgba(255,255,255,.15)":"rgba(255,255,255,.25)"
ctx.fillRect(x,y,55,140)

ctx.strokeStyle="white"
ctx.strokeRect(x,y,55,140)

ctx.fillStyle="white"
ctx.font="14px Arial"
ctx.fillText(cats[i],x+18,y+16)

for(let p=0;p<numPlayers;p++){

let val=scores[p][cats[i]]

let disp="-"

if(val!=null) disp=val
else if(p==pIdx) disp=getVal(cats[i],dice)

ctx.fillText(disp,x+20,y+40+p*25)

}

}

}

function drawTotals(){

for(let p=0;p<numPlayers;p++){

let total=0

for(let c of cats){
if(scores[p][c]!=null) total+=scores[p][c]
}

ctx.fillStyle=colors[p]
ctx.font="16px Arial"
ctx.fillText("P"+(p+1)+": "+total,20+p*120,470)

}

}

function draw(){

ctx.clearRect(0,0,1000,520)

if(state==MENU){

ctx.fillStyle="white"
ctx.font="48px Arial"
ctx.fillText("YATZY",430,150)

drawButton(450,240,100,40,"PLAY")

}

else if(state==PLAYER_SELECT){

ctx.fillStyle="white"
ctx.font="28px Arial"
ctx.fillText("Select Players",400,80)

for(let i=1;i<=4;i++){
drawButton(440,120+i*60,120,40,i+" Player"+(i>1?"s":""))
}

}

else if(state==PLAYING){

ctx.fillStyle=colors[pIdx]
ctx.font="18px Arial"
ctx.fillText("P"+(pIdx+1)+" TURN | ROLLS: "+rollsLeft,40,30)

for(let i=0;i<5;i++){

let x=40+i*60

let shakeX=rolling&&!kept[i]?Math.random()*4-2:0
let shakeY=rolling&&!kept[i]?Math.random()*4-2:0

drawDie(x+shakeX,60+shakeY,dice[i],kept[i])

}

drawButton(350,60,80,45,"ROLL")

drawScoreChart()

drawTotals()

}

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
```
