<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Yatzy-Fun</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#f2f2f2;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

canvas{
background:white;
border-radius:16px;
box-shadow:0 20px 40px rgba(0,0,0,.25);
width:95vw;
max-width:1100px;
}

</style>
</head>

<body>

<canvas id="game" width="1100" height="540"></canvas>

<script>

/* -------------------------
GITHUB LEADERBOARD SETTINGS
------------------------- */

const GITHUB_USER="TecBro14"
const GITHUB_REPO="yatzy-fun"
const FILE_PATH="leaderboard.json"
const TOKEN="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"

let leaderboard=[]

async function loadLeaderboard(){

const res=await fetch(
`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`
)

const data=await res.json()

const content=atob(data.content)

leaderboard=JSON.parse(content)

leaderboard.sort((a,b)=>b.score-a.score)

leaderboard=leaderboard.slice(0,10)

return data.sha

}

async function submitScore(name,score){

const res=await fetch(
`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`
)

const data=await res.json()

let content=JSON.parse(atob(data.content))

content.push({name,score})

content.sort((a,b)=>b.score-a.score)

content=content.slice(0,10)

await fetch(
`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`,
{
method:"PUT",
headers:{
Authorization:`Bearer ${TOKEN}`,
"Content-Type":"application/json"
},
body:JSON.stringify({
message:"update leaderboard",
content:btoa(JSON.stringify(content,null,2)),
sha:data.sha
})
}
)

leaderboard=content

}

/* -------------------------
GAME
------------------------- */

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const MENU=0
const PLAYING=1

let state=MENU

let username=""

let dice=[1,2,3,4,5]
let kept=[false,false,false,false,false]

let rollsLeft=2

function rollDie(){
return Math.floor(Math.random()*6)+1
}

function startTurn(){

for(let i=0;i<5;i++) dice[i]=rollDie()

kept=[false,false,false,false,false]

rollsLeft=2

}

canvas.onclick=e=>{

let rect=canvas.getBoundingClientRect()

let mx=(e.clientX-rect.left)*(canvas.width/rect.width)
let my=(e.clientY-rect.top)*(canvas.height/rect.height)

if(state==MENU){

username=prompt("Enter username for leaderboard:")

if(!username) username="Player"

startTurn()

state=PLAYING

}

else if(state==PLAYING){

for(let i=0;i<5;i++){

let x=50+i*80

if(mx>x && mx<x+60 && my>80 && my<140){

kept[i]=!kept[i]

}

}

if(mx>460 && mx<560 && my>80 && my<140 && rollsLeft>0){

for(let i=0;i<5;i++){

if(!kept[i]) dice[i]=rollDie()

}

rollsLeft--

}

}

}

function drawRounded(x,y,w,h,r){

ctx.beginPath()
ctx.moveTo(x+r,y)
ctx.lineTo(x+w-r,y)
ctx.quadraticCurveTo(x+w,y,x+w,y+r)
ctx.lineTo(x+w,y+h-r)
ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h)
ctx.lineTo(x+r,y+h)
ctx.quadraticCurveTo(x,y+h,x,y+h-r)
ctx.lineTo(x,y+r)
ctx.quadraticCurveTo(x,y,x+r,y)
ctx.closePath()

ctx.fill()
ctx.stroke()

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(state==MENU){

ctx.fillStyle="black"
ctx.font="46px Arial"

ctx.fillText("Yatzy-Fun",420,120)

ctx.fillStyle="#ddd"

drawRounded(470,240,160,50,12)

ctx.fillStyle="black"
ctx.font="20px Arial"

ctx.fillText("PLAY",525,272)

/* leaderboard */

ctx.font="22px Arial"

ctx.fillText("Global Leaderboard",780,120)

ctx.font="16px Arial"

for(let i=0;i<leaderboard.length;i++){

let e=leaderboard[i]

ctx.fillText(
(i+1)+". "+e.name+" - "+e.score,
780,
160+i*28
)

}

}

if(state==PLAYING){

ctx.fillStyle="black"

ctx.font="20px Arial"

ctx.fillText("Rolls Left: "+rollsLeft,50,40)

for(let i=0;i<5;i++){

let x=50+i*80

ctx.fillStyle=kept[i]?"#c8f7c5":"#fff"

drawRounded(x,80,60,60,10)

ctx.fillStyle="black"

ctx.font="22px Arial"

ctx.fillText(dice[i],x+24,115)

}

ctx.fillStyle="#ddd"

drawRounded(460,80,100,60,10)

ctx.fillStyle="black"

ctx.fillText("ROLL",482,115)

}

}

function loop(){

draw()

requestAnimationFrame(loop)

}

loadLeaderboard()

loop()

</script>

</body>
</html>
